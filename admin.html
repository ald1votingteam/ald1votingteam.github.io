<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ALPHA DRIVE ONE | Admin Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
   <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.cdnfonts.com/css/ica-rubrik-black');
        @import url('https://fonts.cdnfonts.com/css/poppins');
        
        :root {
            --primary-gold: #e4dcb8;
            --secondary-gold: #85796e;
            --dark-bg: #0c0c0c;
            --light-text: #ffffff;
            --muted-text: #d0cee0;
            --nav-bg: rgba(0, 0, 0, 0.95);
            --card-bg: rgba(0, 0, 0, 0.8);
            --border-color: rgba(228, 220, 184, 0.3);
            --accent-gradient: linear-gradient(45deg, #e4dcb8, #9e9c3c);
            --success-color: #4CAF50;
            --danger-color: #ff5252;
            --input-bg: rgba(255, 255, 255, 0.05);
        }
        
        * { 
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }
        
        html { scroll-behavior: smooth; }
        
        body {
            font-family: "Poppins", sans-serif;
            background: linear-gradient(135deg, var(--dark-bg) 0%, var(--primary-gold) 50%, var(--secondary-gold) 100%);
            color: var(--light-text);
            min-height: 100vh;
            line-height: 1.6;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Animated Background */
        .bg-animation {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; opacity: 0.15;
            background: 
                radial-gradient(circle at 20% 30%, rgba(228, 220, 184, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(133, 121, 110, 0.1) 0%, transparent 40%);
            animation: float 20s infinite ease-in-out alternate;
        }
        @keyframes float { 0% { transform: scale(1) rotate(0deg); } 100% { transform: scale(1.1) rotate(180deg); } }

        /* Navigation */
        nav {
            width: 100%; min-height: 60px; background: var(--nav-bg);
            backdrop-filter: blur(10px); position: fixed; top: 0; left: 0;
            z-index: 1000; font-family: 'ICA Rubrik';
            border-bottom: 1px solid var(--border-color); padding: 0 5%;
        }

        .nav-container {
            display: flex; align-items: center; justify-content: space-between;
            height: 60px; max-width: 1400px; margin: 0 auto;
        }

        .logo {
            font-size: 1rem; color: white; font-weight: 500;
            background: var(--accent-gradient); -webkit-background-clip: text;
            -webkit-text-fill-color: transparent; text-decoration: none;
            display: flex; align-items: center; gap: 8px;
        }

        .nav-links { display: flex; gap: 20px; }
        .nav-link { color: var(--muted-text); text-decoration: none; font-size: 0.9rem; }
        .nav-link:hover { color: white; }

        /* Main Content */
        .main-content {
            margin-top: 80px; padding: 20px 5%;
            width: 100%; max-width: 1400px; margin-left: auto; margin-right: auto;
        }

        /* Page Header */
        .page-header {
            text-align: center; margin-bottom: 30px; padding: 30px 20px;
            background: var(--card-bg); border-radius: 20px;
            border: 1px solid var(--border-color);
        }

        .page-header h2 {
            font-size: 2rem; margin-bottom: 15px;
            background: linear-gradient(45deg, var(--primary-gold), var(--secondary-gold));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        /* Admin Section (Visible by default) */
        .admin-section {
            display: block; /* FORCE VISIBLE */
            background: rgba(228, 220, 184, 0.05);
            border: 1px solid var(--primary-gold);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 0 20px rgba(228, 220, 184, 0.1);
        }

        .admin-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px; border-bottom: 1px solid var(--border-color); padding-bottom: 15px;
        }

        .admin-header h3 { color: var(--primary-gold); font-size: 1.5rem; }

        .admin-form-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px;
        }

        .form-group { display: flex; flex-direction: column; gap: 8px; }
        .form-group label { font-size: 0.9rem; color: var(--muted-text); font-weight: 500; }

        .form-control {
            background: var(--input-bg); border: 1px solid var(--border-color);
            border-radius: 8px; padding: 12px 15px; color: var(--light-text);
            font-family: 'Poppins', sans-serif; font-size: 1rem;
        }
        .form-control:focus { outline: none; border-color: var(--primary-gold); }

        .btn {
            padding: 12px 25px; border-radius: 8px; border: none;
            font-weight: 600; cursor: pointer; font-family: 'Poppins', sans-serif;
            background: var(--accent-gradient); color: var(--dark-bg); width: 100%;
        }
        .btn:hover { opacity: 0.9; }

        /* Stats & Links */
        .stats-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px; margin-bottom: 30px;
        }
        .stat-card {
            background: var(--card-bg); border: 1px solid var(--border-color);
            border-radius: 15px; padding: 25px; text-align: center;
        }
        .stat-number {
            font-size: 2.5rem; font-weight: 700;
            background: var(--accent-gradient); -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .links-header {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;
        }

        .filters { display: flex; gap: 10px; }
        .filter-btn {
            padding: 8px 16px; background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--border-color); color: var(--muted-text);
            border-radius: 20px; cursor: pointer;
        }
        .filter-btn.active {
            background: var(--accent-gradient); color: var(--dark-bg); border-color: var(--primary-gold);
        }

        .search-box {
            width: 100%; padding: 12px 20px; margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.1); border: 1px solid var(--border-color);
            border-radius: 25px; color: white;
        }

        .links-container {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px;
        }

        .link-card {
            background: var(--card-bg); border: 1px solid var(--border-color);
            border-radius: 15px; padding: 20px; position: relative;
            transition: transform 0.2s;
        }
        .link-card:hover { transform: translateY(-5px); border-color: var(--primary-gold); }

        .link-platform { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; }
        .link-platform i {
            color: var(--primary-gold); font-size: 1.2rem;
            background: rgba(228, 220, 184, 0.1); padding: 10px; border-radius: 8px;
        }
        .link-platform h4 { margin: 0; font-size: 1.1rem; }

        .link-url {
            display: block; text-align: center; padding: 12px;
            background: rgba(255, 255, 255, 0.05); border-radius: 10px;
            color: var(--primary-gold); text-decoration: none; margin: 10px 0;
        }

        .link-actions { display: flex; justify-content: space-between; margin-top: 15px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px; }

        .action-btn {
            background: transparent; border: 1px solid var(--border-color);
            color: var(--muted-text); padding: 5px 10px; border-radius: 5px;
            cursor: pointer; font-size: 0.8rem; text-decoration: none;
        }
        .action-btn.delete { color: var(--danger-color); border-color: var(--danger-color); }
    </style>
</head>
<body>
    <!-- Animated Background -->
    <div class="bg-animation"></div>

    <!-- Navigation -->
    <nav>
        <div class="nav-container">
            <a href="index.html" class="logo">
                <i class="fas fa-vote-yea"></i> ALPHA DRIVE ONE
            </a>
            <div class="nav-links">
                <a href="index.html" class="nav-link"><i class="fas fa-home"></i> Public View</a>
                <a href="#" class="nav-link active"><i class="fas fa-user-shield"></i> Admin Dashboard</a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Page Header -->
        <div class="page-header">
            <h2><i class="fas fa-tools"></i> Admin Dashboard</h2>
            <p>Manage your voting links here. No password required on this page.</p>
        </div>

        <!-- Admin Section (Always Visible) -->
        <section id="admin-panel" class="admin-section">
            <div class="admin-header">
                <h3><i class="fas fa-plus-circle"></i> Add New Link</h3>
                <div id="connection-status" style="font-size: 0.9rem; color: var(--warning-color);">
                    <i class="fas fa-exclamation-triangle"></i> Check HTML for Credentials
                </div>
            </div>
            
            <form id="add-link-form" class="admin-form-grid">
                <div class="form-group">
                    <label>Platform Name</label>
                    <input type="text" id="input-platform" class="form-control" placeholder="e.g. Idol Champ" required>
                </div>
                <div class="form-group">
                    <label>Link URL</label>
                    <input type="url" id="input-url" class="form-control" placeholder="https://..." required>
                </div>
                <div class="form-group">
                    <label>Type</label>
                    <select id="input-type" class="form-control">
                        <option value="daily">Daily Vote</option>
                        <option value="event">Event</option>
                        <option value="emergency">Emergency</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Notes</label>
                    <input type="text" id="input-notes" class="form-control" placeholder="Instructions">
                </div>
                <div class="form-group" style="grid-column: 1 / -1;">
                    <button type="submit" class="btn"><i class="fas fa-save"></i> Save to Database</button>
                </div>
            </form>
        </section>

        <!-- Quick Stats -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-number" id="total-links">0</div>
                <div class="stat-label">Total Links</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="daily-links">0</div>
                <div class="stat-label">Daily Votes</div>
            </div>
        </div>

        <!-- Links Section -->
        <section>
            <div class="links-header">
                <h3><i class="fas fa-list"></i> Manage Links</h3>
                <div class="filters">
                    <button class="filter-btn active" data-filter="all">All</button>
                    <button class="filter-btn" data-filter="daily">Daily</button>
                    <button class="filter-btn" data-filter="event">Events</button>
                    <button class="filter-btn" data-filter="emergency">Emergency</button>
                </div>
            </div>

            <input type="text" id="search-box" class="search-box" placeholder="Search...">

            <div class="links-container" id="links-container">
                <!-- Links render here -->
            </div>
        </section>
    </main>

    <script>
        // ================================================================
        // --- CONFIGURATION ---
        // ================================================================
             // PASTE YOUR SUPABASE CREDENTIALS HERE
        const SUPABASE_URL = "https://jbjxljlaqarszwnehyye.supabase.co"; 
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpianhsamxhcWFyc3p3bmVoeXllIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxMjIzMDMsImV4cCI6MjA4ODY5ODMwM30.EXumn0fsKv3ir_wxuH0Fh3oXzPaj1R2MI1S8ND_S2uQ";

        // ================================================================
        // ================================================================

       
        let supabaseLinks = [];

        // Static Data (Fallback)
        const STATIC_LINKS = [
            { id: 1, Platform: "Muniverse Web", Link: "https://t.co/vWMY1WciMX", Type: "daily", Notes: "STAGE M PICK", Status: "active", isNew: true },
            { id: 5, Platform: "UPICK", Link: "https://t.co/nZ2rnaHIFV", Type: "emergency", Notes: "Best Rising Star (Boy)", Status: "active", isNew: true },
        ];

        let allLinks = [...STATIC_LINKS];

        // Elements
        const elements = {
            linksContainer: document.getElementById('links-container'),
            searchBox: document.getElementById('search-box'),
            filterButtons: document.querySelectorAll('.filter-btn'),
            totalLinks: document.getElementById('total-links'),
            dailyLinks: document.getElementById('daily-links'),
            connectionStatus: document.getElementById('connection-status'),
            addLinkForm: document.getElementById('add-link-form')
        };

        document.addEventListener('DOMContentLoaded', () => {
            initSupabase();
            setupEventListeners();
            loadVotingLinks();
        });

        function setupEventListeners() {
            elements.searchBox.addEventListener('input', filterLinks);
            elements.filterButtons.forEach(btn => {
                btn.addEventListener('click', () => {
                    elements.filterButtons.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    filterLinks();
                });
            });

            elements.addLinkForm.addEventListener('submit', handleAddLink);
        }

        function initSupabase() {
            if (SUPABASE_URL.includes("PASTE_YOUR")) return;
            try {
                if (window.supabase) {
                    supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                    elements.connectionStatus.innerHTML = '<i class="fas fa-check-circle" style="color:var(--success-color)"></i> Connected';
                    elements.connectionStatus.style.color = "var(--success-color)";
                    fetchSupabaseLinks();
                }
            } catch (error) {
                console.error("Supabase init error:", error);
                elements.connectionStatus.innerHTML = '<i class="fas fa-times-circle"></i> Connection Error';
            }
        }

        async function fetchSupabaseLinks() {
            if (!supabase) return;
            const { data, error } = await supabase
                .from('voting_links')
                .select('*')
                .eq('status', 'active')
                .order('created_at', { ascending: false });

            if (error) {
                console.error('Error fetching links:', error);
                return;
            }

            supabaseLinks = data.map(item => ({
                id: item.id,
                Platform: item.platform,
                Link: item.link,
                Type: item.type,
                Notes: item.notes,
                Status: item.status,
                isNew: item.is_new,
                isDbItem: true
            }));

            allLinks = [...STATIC_LINKS, ...supabaseLinks];
            filterLinks();
            updateStats();
        }

        async function handleAddLink(e) {
            e.preventDefault();
            if (!supabase) {
                alert("Supabase not configured. Edit HTML file.");
                return;
            }

            const newLink = {
                platform: document.getElementById('input-platform').value,
                link: document.getElementById('input-url').value,
                type: document.getElementById('input-type').value,
                notes: document.getElementById('input-notes').value,
                status: 'active',
                is_new: true
            };

            const { error } = await supabase
                .from('voting_links')
                .insert([newLink]);

            if (error) {
                alert("Error saving: " + error.message);
            } else {
                alert("Link saved successfully!");
                elements.addLinkForm.reset();
                fetchSupabaseLinks();
            }
        }

        async function deleteDbLink(id) {
            if(!confirm("Are you sure you want to delete this link?")) return;
            const { error } = await supabase.from('voting_links').delete().eq('id', id);
            if (error) alert("Failed to delete");
            else { 
                alert("Link deleted"); 
                fetchSupabaseLinks(); 
            }
        }

        function loadVotingLinks() {
            if (!supabase) {
                setTimeout(() => { filterLinks(); updateStats(); }, 500);
            }
        }

        function filterLinks() {
            const searchTerm = elements.searchBox.value.toLowerCase();
            const activeFilter = document.querySelector('.filter-btn.active').dataset.filter;

            const filteredLinks = allLinks.filter(link => {
                if (activeFilter !== 'all' && link.Type.toLowerCase() !== activeFilter) return false;
                const searchMatch = link.Platform.toLowerCase().includes(searchTerm) || 
                                    (link.Notes && link.Notes.toLowerCase().includes(searchTerm));
                return searchMatch;
            });

            renderLinks(filteredLinks);
        }

        function renderLinks(list) {
            if (list.length === 0) {
                elements.linksContainer.innerHTML = '<p style="text-align:center; grid-column:1/-1;">No links found.</p>';
                return;
            }

            elements.linksContainer.innerHTML = list.map(link => {
                const deleteBtn = link.isDbItem 
                    ? `<button onclick="deleteDbLink(${link.id})" class="action-btn delete"><i class="fas fa-trash"></i> Delete</button>` 
                    : '';
                
                return `
                <div class="link-card">
                    <div class="link-platform"><i class="fas fa-vote-yea"></i><h4>${link.Platform}</h4></div>
                    <a href="${link.Link}" target="_blank" class="link-url">Open Link</a>
                    <div class="link-actions">
                        <span style="font-size:0.8rem; color:var(--muted-text)">${link.Type.toUpperCase()}</span>
                        ${deleteBtn}
                    </div>
                </div>`;
            }).join('');
        }

        function updateStats() {
            elements.totalLinks.textContent = allLinks.length;
            elements.dailyLinks.textContent = allLinks.filter(l => l.Type === 'daily').length;
        }
    </script>
</body>
</html>
